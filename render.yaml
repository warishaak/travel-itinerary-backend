databases:
  - name: travel-itinerary-db
    databaseName: travel_itinerary_db_20260326
    user: travel_itinerary_user_20260326
    plan: free

services:
  - type: web
    name: travel-itinerary-backend
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: travel-itinerary-db
          property: connectionString
