databases:
  - name: travel-itinerary-db
    databaseName: travel_itinerary
    user: travel_itinerary_user
    plan: free

services:
  - type: web
    name: travel-itinerary-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: travel-itinerary-db
          property: connectionString
