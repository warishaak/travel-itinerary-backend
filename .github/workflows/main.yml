name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'travel-itinerary-backend-main/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'travel-itinerary-backend-main/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  format-check:
    name: Check Code Formatting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: travel-itinerary-backend-main/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Black
        run: pip install black==23.12.1

      - name: Run Black formatter check
        run: black --check .

  import-sort-check:
    name: Check Import Sorting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: travel-itinerary-backend-main/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install isort
        run: pip install isort==5.13.2

      - name: Run isort check
        run: isort --check-only .

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: travel-itinerary-backend-main/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff==0.1.9

      - name: Run Ruff linter
        run: ruff check . --exclude=venv,migrations

  django-checks:
    name: Django System Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: travel-itinerary-backend-main/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --no-input